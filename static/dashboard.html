<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股投研智能体 - 数据仪表盘</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f1117; --card:#1a1d29; --border:#2a2d3a; --text:#e1e4ea;
  --muted:#6b7280; --accent:#3b82f6; --green:#10b981; --red:#ef4444;
  --yellow:#f59e0b; --purple:#8b5cf6;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { color:var(--accent); text-decoration:none; }

/* Layout */
.layout { display:flex; min-height:100vh; }
.sidebar { width:220px; background:var(--card); border-right:1px solid var(--border); padding:20px 0; flex-shrink:0; }
.sidebar h1 { font-size:15px; padding:0 20px 20px; border-bottom:1px solid var(--border); color:var(--accent); }
.nav { list-style:none; margin-top:10px; }
.nav li { padding:12px 20px; cursor:pointer; color:var(--muted); font-size:14px; transition:all .15s; display:flex; align-items:center; gap:10px; }
.nav li:hover { background:rgba(59,130,246,0.08); color:var(--text); }
.nav li.active { background:rgba(59,130,246,0.12); color:var(--accent); border-right:3px solid var(--accent); }
.nav li .icon { font-size:18px; width:24px; text-align:center; }
.main { flex:1; padding:24px 32px; overflow-y:auto; max-height:100vh; }
.page-title { font-size:22px; font-weight:600; margin-bottom:20px; }

/* Cards & stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; }
.stat-card .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.stat-card .value { font-size:28px; font-weight:700; margin-top:6px; }
.stat-card .sub { font-size:12px; color:var(--muted); margin-top:4px; }
.stat-card.blue .value { color:var(--accent); }
.stat-card.green .value { color:var(--green); }
.stat-card.yellow .value { color:var(--yellow); }
.stat-card.purple .value { color:var(--purple); }
.stat-card.red .value { color:var(--red); }

/* Table */
.panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
.panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.panel-title { font-size:16px; font-weight:600; }
.toolbar { display:flex; gap:10px; align-items:center; }
.toolbar input { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; outline:none; width:200px; }
.toolbar input:focus { border-color:var(--accent); }
.toolbar select { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--muted); font-weight:500; cursor:pointer; user-select:none; }
th:hover { color:var(--accent); }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
tr:hover td { background:rgba(59,130,246,0.04); }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
.badge-st { background:var(--red); color:#fff; }
.badge-active { background:var(--green); color:#fff; }
.badge-pending { background:var(--yellow); color:#000; }
.badge-approved { background:var(--green); color:#fff; }

/* Pagination */
.pagination { display:flex; gap:6px; justify-content:center; margin-top:16px; }
.pagination button { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; }
.pagination button:hover { border-color:var(--accent); }
.pagination button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.pagination button:disabled { opacity:0.4; cursor:default; }

/* Buttons */
.btn { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:opacity .15s; }
.btn:hover { opacity:0.85; }
.btn-blue { background:var(--accent); color:#fff; }
.btn-green { background:var(--green); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn-sm { padding:4px 10px; font-size:12px; }

/* Semantic search */
.search-box { display:flex; gap:10px; margin-bottom:20px; }
.search-box input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:12px 16px; border-radius:8px; font-size:14px; outline:none; }
.search-box input:focus { border-color:var(--accent); }
.search-result { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:10px; }
.search-result .score { color:var(--accent); font-weight:600; font-size:14px; }
.search-result .doc { color:var(--text); font-size:13px; margin-top:6px; line-height:1.6; }
.search-result .meta { color:var(--muted); font-size:12px; margin-top:6px; }

/* Alert items */
.alert-card { background:var(--bg); border-left:4px solid var(--red); border-radius:0 8px 8px 0; padding:14px 16px; margin-bottom:10px; }
.alert-card .title { font-weight:600; font-size:14px; }
.alert-card .detail { color:var(--muted); font-size:13px; margin-top:6px; }
.alert-card .metrics { display:flex; gap:16px; margin-top:8px; }
.alert-card .metric { font-size:13px; }
.alert-card .metric b { color:var(--accent); }

/* SOP cards */
.sop-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; }
.sop-card .sop-title { font-weight:600; font-size:14px; margin-bottom:8px; }
.sop-card pre { background:var(--card); padding:10px; border-radius:6px; font-size:12px; overflow-x:auto; max-height:200px; overflow-y:auto; }
.sop-actions { display:flex; gap:8px; margin-top:10px; }

/* Stock pool */
.tier-header { font-size:15px; font-weight:600; margin:16px 0 10px; padding-left:8px; border-left:3px solid var(--accent); }
.stock-item { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border); }
.stock-item:last-child { border-bottom:none; }
.stock-item .code { font-weight:600; color:var(--accent); }
.stock-item .score { color:var(--green); font-weight:600; }
.stock-item .reason { color:var(--muted); font-size:12px; max-width:50%; text-align:right; }

/* News feed */
.news-item { padding:14px 0; border-bottom:1px solid var(--border); }
.news-item:last-child { border-bottom:none; }
.news-item .news-time { font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; gap:8px; align-items:center; }
.news-item .news-time .source-tag { background:var(--accent); color:#fff; padding:1px 6px; border-radius:3px; font-size:11px; }
.news-item .news-time .source-tag.policy { background:var(--purple); }
.news-item .news-link { font-size:11px; color:var(--accent); text-decoration:none; margin-left:6px; }
.news-item .news-link:hover { text-decoration:underline; }
.news-item .news-title { font-size:14px; font-weight:500; line-height:1.5; }
.news-item .news-summary { font-size:13px; color:var(--muted); margin-top:6px; line-height:1.6; }
.news-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.news-toolbar .info { color:var(--muted); font-size:13px; }
.news-toolbar .refresh-btn { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
.news-toolbar .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

/* Loading */
.loading { text-align:center; padding:40px; color:var(--muted); }
.empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

/* Action buttons & task panel */
.action-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:16px; }
.action-btn { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer; text-align:left; transition:all .15s; }
.action-btn:hover { border-color:var(--accent); background:rgba(59,130,246,0.06); }
.action-btn:active { transform:scale(0.98); }
.action-btn .action-icon { font-size:22px; margin-bottom:6px; }
.action-btn .action-label { font-size:14px; font-weight:600; }
.action-btn .action-desc { font-size:12px; color:var(--muted); margin-top:4px; }
.action-btn.running { border-color:var(--yellow); opacity:0.7; pointer-events:none; }
.action-btn.running .action-label::after { content:' (运行中...)'; color:var(--yellow); font-weight:400; font-size:12px; }

.task-list { margin-top:12px; }
.task-item { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; margin-bottom:8px; font-size:13px; }
.task-item .task-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.task-item .task-name { font-weight:600; }
.task-item .task-status { font-size:12px; padding:2px 8px; border-radius:10px; }
.task-item .task-status.running { background:var(--yellow); color:#000; }
.task-item .task-status.done { background:var(--green); color:#fff; }
.task-item .task-status.failed { background:var(--red); color:#fff; }
.task-item .task-status.pending { background:var(--muted); color:#fff; }
.task-log { background:#0d0f15; border-radius:4px; padding:8px; max-height:150px; overflow-y:auto; font-family:monospace; font-size:11px; color:var(--muted); white-space:pre-wrap; word-break:break-all; margin-top:6px; }

/* Responsive */
@media(max-width:768px) {
  .sidebar { width:60px; } .sidebar h1 { font-size:0; padding:10px; } .sidebar h1::first-letter { font-size:15px; }
  .nav li { padding:10px; font-size:0; } .nav li .icon { font-size:18px; }
  .main { padding:16px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h1>A股投研智能体</h1>
    <ul class="nav">
      <li class="active" data-page="overview"><span class="icon">&#9673;</span> 系统概览</li>
      <li data-page="news"><span class="icon">&#9993;</span> 消息面</li>
      <li data-page="stocks"><span class="icon">&#9733;</span> 股票库</li>
      <li data-page="semantic"><span class="icon">&#9782;</span> 语义搜索</li>
      <li data-page="alerts"><span class="icon">&#9888;</span> 预警信号</li>
      <li data-page="pool"><span class="icon">&#9830;</span> 图谱股池</li>
      <li data-page="sop"><span class="icon">&#9881;</span> SOP 管理</li>
    </ul>
  </div>
  <div class="main" id="content"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; };

async function api(path) {
  try { const r = await fetch(path); return await r.json(); } catch(e) { return null; }
}

// ── Navigation ──
$$('.nav li').forEach(li => {
  li.onclick = () => {
    $$('.nav li').forEach(l => l.classList.remove('active'));
    li.classList.add('active');
    loadPage(li.dataset.page);
  };
});

function loadPage(name) {
  // 离开概览页时停止任务轮询
  if (_taskPollTimer) { clearInterval(_taskPollTimer); _taskPollTimer = null; }
  const pages = { overview:renderOverview, news:renderNews, stocks:renderStocks, semantic:renderSemantic, alerts:renderAlerts, pool:renderPool, sop:renderSOP };
  (pages[name] || renderOverview)();
}

// ── Overview ──
let _taskPollTimer = null;
async function renderOverview() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">系统概览</h2><div class="loading">加载中...</div>';
  const s = await api('/api/stats');
  if (!s) { c.innerHTML = '<div class="empty">无法连接 API 服务</div>'; return; }

  let html = '<h2 class="page-title">系统概览</h2><div class="stats-grid">';
  html += `<div class="stat-card blue"><div class="label">股票总数</div><div class="value">${s.stock_total||0}</div><div class="sub">活跃 ${s.stock_active||0}</div></div>`;
  html += `<div class="stat-card purple"><div class="label">语义向量</div><div class="value">${s.chroma_count||0}</div><div class="sub">ChromaDB 嵌入</div></div>`;
  html += `<div class="stat-card red"><div class="label">今日预警</div><div class="value">${s.alerts_today||0}</div><div class="sub">三共振信号</div></div>`;
  html += `<div class="stat-card yellow"><div class="label">SOP 待审</div><div class="value">${s.sop_pending||0}</div><div class="sub">共 ${s.sop_active||0} 条 (${s.sop_approved||0} 已批准)</div></div>`;
  html += `<div class="stat-card green"><div class="label">图谱股池</div><div class="value">${s.has_stock_pool?'已生成':'未生成'}</div><div class="sub">静态分析结果</div></div>`;
  html += `<div class="stat-card blue"><div class="label">LLM 缓存</div><div class="value">${s.llm_cache||0}</div><div class="sub">DeepSeek 调用缓存</div></div>`;
  html += '</div>';

  // Infrastructure status
  html += '<div class="panel"><div class="panel-title">基础设施状态</div><div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap">';
  html += `<span class="badge ${s.pg_error?'badge-st':'badge-approved'}">PostgreSQL ${s.pg_error?'离线':'在线'}</span>`;
  html += `<span class="badge ${(s.chroma_count||0)>0?'badge-approved':'badge-st'}">ChromaDB ${(s.chroma_count||0)>0?'在线':'离线'}</span>`;
  html += `<span class="badge ${s.redis_error?'badge-st':'badge-approved'}">Redis ${s.redis_error?'离线':'在线'}</span>`;
  html += '</div></div>';

  // Action panel
  html += '<div class="panel"><div class="panel-title">操作面板</div>';
  html += '<div class="action-grid" id="actionGrid">';
  html += `<div class="action-btn" onclick="triggerTask('init')" data-task="init"><div class="action-icon">&#9881;</div><div class="action-label">初始化数据</div><div class="action-desc">拉取全A股基础信息入库</div></div>`;
  html += `<div class="action-btn" onclick="triggerTask('semantic')" data-task="semantic"><div class="action-icon">&#9782;</div><div class="action-label">语义初始化</div><div class="action-desc">主营业务向量化入库 ChromaDB</div></div>`;
  html += `<div class="action-btn" onclick="triggerTask('static')" data-task="static"><div class="action-icon">&#9733;</div><div class="action-label">静态图谱构建</div><div class="action-desc">产业链分析 + 选股评分</div></div>`;
  html += `<div class="action-btn" onclick="triggerTask('dynamic')" data-task="dynamic"><div class="action-icon">&#9888;</div><div class="action-label">动态监控</div><div class="action-desc">RSS轮询 + 三共振预警</div></div>`;
  html += '</div>';
  html += '<div class="task-list" id="taskList"></div>';
  html += '</div>';

  c.innerHTML = html;
  pollTasks();
}

async function triggerTask(name) {
  try {
    const r = await fetch(`/api/run/${name}`, {method:'POST'});
    const d = await r.json();
    if (d.status === 'already_running') { alert(d.message); return; }
    pollTasks();
  } catch(e) { alert('触发失败: ' + e.message); }
}

let _activeTasks = [];
async function pollTasks() {
  const d = await api('/api/tasks');
  if (!d) return;
  _activeTasks = d.tasks || [];
  const el = document.getElementById('taskList');
  if (!el) return;
  // Update button running state
  document.querySelectorAll('.action-btn').forEach(btn => {
    const taskName = btn.dataset.task;
    const running = _activeTasks.some(t => t.name === taskName && t.status === 'running');
    btn.classList.toggle('running', running);
  });
  // Render task list
  if (!_activeTasks.length) { el.innerHTML = ''; return; }
  let html = '';
  for (const t of _activeTasks.slice(0, 5)) {
    const statusMap = {running:'运行中', done:'已完成', failed:'失败', pending:'等待中'};
    html += `<div class="task-item"><div class="task-header"><span class="task-name">${escHtml(t.label)}</span><span class="task-status ${t.status}">${statusMap[t.status]||t.status}</span></div>`;
    html += `<div style="color:var(--muted);font-size:12px">启动: ${t.started_at?.substring(11,19)||'-'}</div>`;
    if (t.log) html += `<div class="task-log">${escHtml(t.log)}</div>`;
    html += '</div>';
  }
  el.innerHTML = html;
  // Auto-poll if any running
  if (_taskPollTimer) clearInterval(_taskPollTimer);
  if (_activeTasks.some(t => t.status === 'running')) {
    _taskPollTimer = setInterval(pollTasks, 3000);
  } else {
    _taskPollTimer = null;
  }
}

// ── News ──
async function renderNews() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">消息面</h2><div class="panel"><div class="news-toolbar"><div class="info">加载中...</div></div><div class="loading">获取最新消息...</div></div>';
  const d = await api('/api/news?limit=100');
  if (!d) { c.innerHTML = '<div class="empty">无法连接 API，请确认服务已启动</div>'; return; }
  let html = '<h2 class="page-title">消息面</h2><div class="panel">';
  // 状态诊断条
  if (d.redis === false) {
    html += `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">⚠ Redis 未连接 — ${escHtml(d.hint||'请检查 SSH 隧道')}</div>`;
  }
  html += `<div class="news-toolbar"><div class="info">实时消息 | 共 ${d.count} 条 | 多源聚合（财联社/国务院/证监会）${d.feed_total ? ' | 缓存 '+d.feed_total+' 条' : ''}</div><button class="refresh-btn" onclick="renderNews()">&#8635; 刷新</button></div>`;
  if (d.error) {
    html += `<div class="empty" style="color:var(--red)">读取异常: ${escHtml(d.error)}</div>`;
  } else if (!d.items.length) {
    html += `<div class="empty">暂无新闻数据<br><small style="line-height:2">
      ${d.redis ? '消息 feed 为空，请先启动 <b>动态监控</b> 采集新闻' : ''}
      <br>在上方操作面板点击「动态监控」或运行 <code>python main.py --mode dynamic</code>
    </small></div>`;
  } else {
    // Group by date
    let lastDate = '';
    for (const n of d.items) {
      const dt = n.pub_time ? new Date(n.pub_time) : null;
      const dateStr = dt ? dt.toLocaleDateString('zh-CN') : '未知日期';
      const timeStr = dt ? dt.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '';
      if (dateStr !== lastDate) {
        lastDate = dateStr;
        html += `<div style="padding:8px 0;margin-top:8px;border-top:1px solid var(--border);color:var(--accent);font-size:13px;font-weight:600">${dateStr}</div>`;
      }
      const summary = (n.summary||'').replace(/<[^>]*>/g, '').trim();
      const isPolicy = n.source_type === 'policy';
      const tagClass = isPolicy ? 'source-tag policy' : 'source-tag';
      const linkHtml = n.url ? `<a class="news-link" href="${escHtml(n.url)}" target="_blank">[原文]</a>` : '';
      html += `<div class="news-item">
        <div class="news-time"><span class="${tagClass}">${escHtml(n.source||'未知')}</span> ${timeStr}${linkHtml}</div>
        <div class="news-title">${escHtml(n.title||'')}</div>
        ${summary ? `<div class="news-summary">${escHtml(summary.substring(0, 300))}</div>` : ''}
      </div>`;
    }
  }
  html += '</div>';
  c.innerHTML = html;
}

// ── Stocks ──
let stockState = { page:1, search:'', sort:'circ_mv', order:'desc' };
async function renderStocks() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">股票库</h2><div class="panel"><div class="panel-header"><div class="toolbar"><input id="stockSearch" placeholder="搜索代码或名称..." value="'+stockState.search+'"><select id="stockSize"><option value="50">50条/页</option><option value="100">100条/页</option><option value="200">200条/页</option></select></div></div><div class="loading">加载中...</div></div>';

  $('#stockSearch').oninput = debounce(e => { stockState.search=e.target.value; stockState.page=1; fetchStocks(); }, 400);
  $('#stockSize').onchange = e => { stockState.size=+e.target.value; stockState.page=1; fetchStocks(); };
  fetchStocks();
}

async function fetchStocks() {
  const c = $('#content');
  const p = c.querySelector('.loading') || c.querySelector('.panel');
  const s = stockState;
  const d = await api(`/api/stocks?page=${s.page}&size=${s.size||50}&search=${encodeURIComponent(s.search)}&sort=${s.sort}&order=${s.order}`);
  if (!d) return;

  let html = `<table><thead><tr>
    <th onclick="sortStock('ts_code')">代码 ${sortIcon('ts_code')}</th>
    <th onclick="sortStock('name')">名称</th>
    <th onclick="sortStock('industry')">行业</th>
    <th onclick="sortStock('circ_mv')">流通市值 ${sortIcon('circ_mv')}</th>
    <th>状态</th>
  </tr></thead><tbody>`;
  for (const s of d.items) {
    const mv = s.circ_mv ? (s.circ_mv/10000).toFixed(0)+' 亿' : '-';
    const st = s.is_st ? '<span class="badge badge-st">ST</span>' : '<span class="badge badge-active">活跃</span>';
    html += `<tr><td><b>${s.ts_code}</b></td><td>${s.name}</td><td>${s.industry||'-'}</td><td>${mv}</td><td>${st}</td></tr>`;
  }
  if (!d.items.length) html += '<tr><td colspan="5" class="empty">无数据</td></tr>';
  html += '</tbody></table>';
  html += renderPagination(d.page, d.pages, 'gotoStockPage');

  const panel = c.querySelector('.panel');
  const toolbar = panel.querySelector('.panel-header');
  panel.innerHTML = '';
  panel.appendChild(toolbar);
  panel.insertAdjacentHTML('beforeend', html);
}

function sortStock(col) { stockState.sort=col; stockState.order=stockState.order==='desc'?'asc':'desc'; fetchStocks(); }
function sortIcon(col) { return stockState.sort===col ? (stockState.order==='desc'?'&#9660;':'&#9650;') : ''; }
function gotoStockPage(p) { stockState.page=p; fetchStocks(); }

// ── Semantic ──
async function renderSemantic() {
  const c = $('#content');
  c.innerHTML = `<h2 class="page-title">语义搜索</h2>
    <div class="panel"><p style="color:var(--muted);margin-bottom:12px">输入业务关键词，通过 ChromaDB 向量搜索匹配最相似的上市公司主营业务描述</p>
    <div class="search-box"><input id="semQuery" placeholder="例如：新能源电池、机器人、白酒..." autofocus><button class="btn btn-blue" onclick="doSemanticSearch()">搜索</button></div>
    <div id="semResults"></div></div>`;
  $('#semQuery').onkeydown = e => { if(e.key==='Enter') doSemanticSearch(); };
}

async function doSemanticSearch() {
  const q = $('#semQuery').value.trim();
  if (!q) return;
  const r = $('#semResults');
  r.innerHTML = '<div class="loading">搜索中...</div>';
  const d = await api(`/api/semantic?q=${encodeURIComponent(q)}&n=15`);
  if (!d || d.error) { r.innerHTML = `<div class="empty">${d?.error||'搜索失败'}</div>`; return; }
  if (!d.items.length) { r.innerHTML = '<div class="empty">未找到匹配结果</div>'; return; }
  let html = `<p style="color:var(--muted);margin-bottom:12px">找到 ${d.count} 条相关结果</p>`;
  for (const it of d.items) {
    const pct = (it.score*100).toFixed(1);
    html += `<div class="search-result"><div class="score">${it.id} - 匹配度 ${pct}%</div><div class="doc">${escHtml(it.document)}</div>`;
    if (it.metadata && Object.keys(it.metadata).length) html += `<div class="meta">${JSON.stringify(it.metadata)}</div>`;
    html += '</div>';
  }
  r.innerHTML = html;
}

// ── Alerts ──

  const d = await api('/alerts/today');
  if (!d) { c.innerHTML = '<div class="empty">无法获取预警数据</div>'; return; }
  let html = `<h2 class="page-title">今日预警 (${d.date})</h2>`;
  html += '<div style="margin-bottom:12px"><button class="btn btn-blue btn-sm" onclick="renderAlerts()">&#8635; 刷新</button></div>';
  if (!d.items.length) { html += '<div class="panel"><div class="empty">今日无三共振预警信号</div></div>'; }
  else {
    html += `<p style="color:var(--muted);margin-bottom:12px">共 ${d.count} 条信号</p>`;
    for (const a of d.items) {
      html += `<div class="alert-card">
        <div class="title">${a.ts_code}</div>
        <div class="detail">${escHtml(a.news_title||'')}</div>
        <div class="metrics">
          <span class="metric">消息评分: <b>${a.news_score?.toFixed(2)||'-'}</b></span>
          <span class="metric">主力净流入: <b>${a.capital_inflow_pct?.toFixed(1)||'-'}%</b></span>
          <span class="metric">量比: <b>${a.volume_ratio?.toFixed(1)||'-'}</b></span>
        </div></div>`;

// ── Stock Pool ──
async function renderPool() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">图谱股池</h2><div class="loading">加载中...</div>';
  const d = await api('/api/stockpool');
  if (!d) { c.innerHTML = '<div class="empty">无法获取数据</div>'; return; }
  let html = '<h2 class="page-title">静态图谱选股结果</h2>';
  // 诊断提示
  if (d.redis === false) {
    html += `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">⚠ Redis 未连接 — ${escHtml(d.hint||'请检查 SSH 隧道')}</div>`;
  } else if (d.hint) {
    html += `<div style="background:var(--yellow);color:#000;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">⚠ ${escHtml(d.hint)}</div>`;
  } else if (d.error) {
    html += `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">⚠ 读取异常: ${escHtml(d.error)}</div>`;
  }
  const t1 = d.tier1 || [];
  const t2 = d.tier2 || [];
  if (!t1.length && !t2.length) {
    if (!d.hint && !d.error && d.redis !== false) {
      html += '<div class="panel"><div class="empty">图谱构建完成但无符合条件的股票<br><small>可能原因：打分阈值过严或候选股池为空，请检查构建日志</small></div></div>';
    } else if (!html.includes('hint') && !html.includes('异常')) {
      html += '<div class="panel"><div class="empty">尚未运行静态图谱构建<br><small>在上方操作面板点击「静态图谱构建」或运行 <code>python main.py --mode static --pdf resources/policy.pdf</code></small></div></div>';
    }
    c.innerHTML = html; return;
  }
  html += `<div style="color:var(--muted);font-size:13px;margin-bottom:12px">共 ${t1.length + t2.length} 只股票入选（第一梯队 ${t1.length} 只 + 第二梯队 ${t2.length} 只）</div>`;
  if (t1.length) {
    html += `<div class="panel"><div class="tier-header">第一梯队 (${t1.length} 只)</div>`;
    for (const s of t1) {
      const mv = s.score ? s.score.toFixed(3) : '-';
      html += `<div class="stock-item"><span class="code">${s.ts_code}</span> <span>${s.name}</span><span class="reason">${escHtml(s.reason||'')}</span><span class="score">${mv}</span></div>`;
    }
    html += '</div>';
  }
  if (t2.length) {
    html += `<div class="panel"><div class="tier-header">第二梯队 (${t2.length} 只)</div>`;
    for (const s of t2) {
      const mv = s.score ? s.score.toFixed(3) : '-';
      html += `<div class="stock-item"><span class="code">${s.ts_code}</span> <span>${s.name}</span><span class="reason">${escHtml(s.reason||'')}</span><span class="score">${mv}</span></div>`;
    }
    html += '</div>';
  }
  c.innerHTML = html;
}

// ── SOP ──
async function renderSOP() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">SOP 管理</h2><div class="loading">加载中...</div>';
  const [p, a] = await Promise.all([api('/sop/pending?limit=50'), api('/sop/active?limit=50')]);
  let html = '<h2 class="page-title">SOP 战法管理</h2>';
  // Pending
  html += `<div class="panel"><div class="panel-title">待审核 (${p?.count||0})</div>`;
  if (p && p.items.length) {
    for (const it of p.items) {
      html += `<div class="sop-card"><div class="sop-title"><span class="badge badge-pending">#${it.id}</span> ${it.status}</div>`;
      if (it.graph_json) html += `<pre>${escHtml(JSON.stringify(it.graph_json, null, 2))}</pre>`;
      if (it.source_text) html += `<p style="color:var(--muted);font-size:12px;margin-top:8px">${escHtml(it.source_text?.substring(0,200)||'')}</p>`;
      html += `<div class="sop-actions"><button class="btn btn-green btn-sm" onclick="sopAction('approve',${it.id})">通过</button><button class="btn btn-red btn-sm" onclick="sopAction('reject',${it.id})">拒绝</button></div></div>`;
    }
  } else { html += '<div class="empty">无待审核 SOP</div>'; }
  html += '</div>';
  // Active
  html += `<div class="panel"><div class="panel-title">已审核 (${a?.count||0})</div>`;
  if (a && a.items.length) {
    for (const it of a.items) {
      const badge = it.approved ? '<span class="badge badge-approved">已批准</span>' : '<span class="badge badge-pending">待批准</span>';
      html += `<div class="sop-card"><div class="sop-title">${badge} #${it.id} ${it.sop_name||''}</div>`;
      if (it.policy_name) html += `<p style="color:var(--muted);font-size:13px">关联政策: ${escHtml(it.policy_name)}</p>`;
      if (it.graph_json) html += `<pre>${escHtml(JSON.stringify(it.graph_json, null, 2))}</pre>`;
      if (it.approved_by) html += `<p style="color:var(--muted);font-size:12px;margin-top:6px">审核人: ${it.approved_by} | ${it.approved_at||''}</p>`;
      html += '</div>';
    }
  } else { html += '<div class="empty">无已审核 SOP</div>'; }
  html += '</div>';
  c.innerHTML = html;
}

async function sopAction(action, id) {
  if (action==='approve') await fetch(`/sop/approve/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:'{"approved_by":"admin"}'});
  else await fetch(`/sop/reject/${id}`, {method:'POST'});
  renderSOP();
}

// ── Helpers ──
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function renderPagination(cur, total, fnName) {
  if (total<=1) return '';
  let h = '<div class="pagination">';
  h += `<button onclick="${fnName}(${cur-1})" ${cur<=1?'disabled':''}>&lt;</button>`;
  const start = Math.max(1, cur-3), end = Math.min(total, cur+3);
  if (start>1) h += `<button onclick="${fnName}(1)">1</button>`;
  if (start>2) h += '<button disabled>...</button>';
  for (let i=start; i<=end; i++) h += `<button class="${i===cur?'active':''}" onclick="${fnName}(${i})">${i}</button>`;
  if (end<total-1) h += '<button disabled>...</button>';
  if (end<total) h += `<button onclick="${fnName}(${total})">${total}</button>`;
  h += `<button onclick="${fnName}(${cur+1})" ${cur>=total?'disabled':''}>&gt;</button>`;
  h += '</div>';
  return h;
}
