version: "3.9"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: astock_searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  rsshub:
    image: diygod/rsshub:latest
    container_name: astock_rsshub
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/"]
      interval: 15s
      timeout: 5s
      retries: 3
