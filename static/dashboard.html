<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股投研智能体 - 数据仪表盘</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f1117; --card:#1a1d29; --border:#2a2d3a; --text:#e1e4ea;
  --muted:#6b7280; --accent:#3b82f6; --green:#10b981; --red:#ef4444;
  --yellow:#f59e0b; --purple:#8b5cf6;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { color:var(--accent); text-decoration:none; }

/* Layout */
.layout { display:flex; min-height:100vh; }
.sidebar { width:220px; background:var(--card); border-right:1px solid var(--border); padding:20px 0; flex-shrink:0; }
.sidebar h1 { font-size:15px; padding:0 20px 20px; border-bottom:1px solid var(--border); color:var(--accent); }
.nav { list-style:none; margin-top:10px; }
.nav li { padding:12px 20px; cursor:pointer; color:var(--muted); font-size:14px; transition:all .15s; display:flex; align-items:center; gap:10px; }
.nav li:hover { background:rgba(59,130,246,0.08); color:var(--text); }
.nav li.active { background:rgba(59,130,246,0.12); color:var(--accent); border-right:3px solid var(--accent); }
.nav li .icon { font-size:18px; width:24px; text-align:center; }
.main { flex:1; padding:24px 32px; overflow-y:auto; max-height:100vh; }
.page-title { font-size:22px; font-weight:600; margin-bottom:20px; }

/* Cards & stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; }
.stat-card .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.stat-card .value { font-size:28px; font-weight:700; margin-top:6px; }
.stat-card .sub { font-size:12px; color:var(--muted); margin-top:4px; }
.stat-card.blue .value { color:var(--accent); }
.stat-card.green .value { color:var(--green); }
.stat-card.yellow .value { color:var(--yellow); }
.stat-card.purple .value { color:var(--purple); }
.stat-card.red .value { color:var(--red); }

/* Table */
.panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
.panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.panel-title { font-size:16px; font-weight:600; }
.toolbar { display:flex; gap:10px; align-items:center; }
.toolbar input { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; outline:none; width:200px; }
.toolbar input:focus { border-color:var(--accent); }
.toolbar select { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--muted); font-weight:500; cursor:pointer; user-select:none; }
th:hover { color:var(--accent); }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
tr:hover td { background:rgba(59,130,246,0.04); }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
.badge-st { background:var(--red); color:#fff; }
.badge-active { background:var(--green); color:#fff; }
.badge-pending { background:var(--yellow); color:#000; }
.badge-approved { background:var(--green); color:#fff; }

/* Pagination */
.pagination { display:flex; gap:6px; justify-content:center; margin-top:16px; }
.pagination button { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; }
.pagination button:hover { border-color:var(--accent); }
.pagination button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.pagination button:disabled { opacity:0.4; cursor:default; }

/* Buttons */
.btn { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:opacity .15s; }
.btn:hover { opacity:0.85; }
.btn-blue { background:var(--accent); color:#fff; }
.btn-green { background:var(--green); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn-sm { padding:4px 10px; font-size:12px; }

/* Semantic search */
.search-box { display:flex; gap:10px; margin-bottom:20px; }
.search-box input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:12px 16px; border-radius:8px; font-size:14px; outline:none; }
.search-box input:focus { border-color:var(--accent); }
.search-result { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:10px; }
.search-result .score { color:var(--accent); font-weight:600; font-size:14px; }
.search-result .doc { color:var(--text); font-size:13px; margin-top:6px; line-height:1.6; }
.search-result .meta { color:var(--muted); font-size:12px; margin-top:6px; }

/* Alert items */
.alert-card { background:var(--bg); border-left:4px solid var(--red); border-radius:0 8px 8px 0; padding:14px 16px; margin-bottom:10px; }
.alert-card .title { font-weight:600; font-size:14px; }
.alert-card .detail { color:var(--muted); font-size:13px; margin-top:6px; }
.alert-card .metrics { display:flex; gap:16px; margin-top:8px; }
.alert-card .metric { font-size:13px; }
.alert-card .metric b { color:var(--accent); }

/* SOP cards */
.sop-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; }
.sop-card .sop-title { font-weight:600; font-size:14px; margin-bottom:8px; }
.sop-card pre { background:var(--card); padding:10px; border-radius:6px; font-size:12px; overflow-x:auto; max-height:200px; overflow-y:auto; }
.sop-actions { display:flex; gap:8px; margin-top:10px; }

/* Stock pool */
.tier-header { font-size:15px; font-weight:600; margin:16px 0 10px; padding-left:8px; border-left:3px solid var(--accent); }
.stock-item { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border); }
.stock-item:last-child { border-bottom:none; }
.stock-item .code { font-weight:600; color:var(--accent); }
.stock-item .score { color:var(--green); font-weight:600; }
.stock-item .reason { color:var(--muted); font-size:12px; max-width:50%; text-align:right; }

/* News feed */
.news-item { padding:14px 0; border-bottom:1px solid var(--border); }
.news-item:last-child { border-bottom:none; }
.news-item .news-time { font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; gap:8px; align-items:center; }
.news-item .news-time .source-tag { background:var(--accent); color:#fff; padding:1px 6px; border-radius:3px; font-size:11px; }
.news-item .news-time .source-tag.policy { background:var(--purple); }
.news-item .news-link { font-size:11px; color:var(--accent); text-decoration:none; margin-left:6px; }
.news-item .news-link:hover { text-decoration:underline; }
.news-item .news-title { font-size:14px; font-weight:500; line-height:1.5; }
.news-item .news-summary { font-size:13px; color:var(--muted); margin-top:6px; line-height:1.6; }
.news-item .news-analysis { margin-top:8px; padding:8px 10px; background:rgba(59,130,246,0.06); border-radius:6px; border-left:3px solid var(--accent); font-size:12px; line-height:1.6; }
.news-item .news-analysis .analysis-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.news-item .news-analysis .score-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-weight:600; font-size:11px; }
.news-item .news-analysis .score-high { background:var(--green); color:#fff; }
.news-item .news-analysis .score-mid { background:var(--yellow); color:#000; }
.news-item .news-analysis .score-low { background:var(--muted); color:#fff; }
.news-item .news-analysis .analysis-label { color:var(--muted); }
.news-item .news-analysis .analysis-value { color:var(--text); }
.news-item .news-analysis .stock-tag { background:var(--bg); border:1px solid var(--border); padding:1px 6px; border-radius:3px; font-size:11px; color:var(--accent); }
.news-item .news-analysis.pending { border-left-color:var(--muted); opacity:0.6; }
.news-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.news-toolbar .info { color:var(--muted); font-size:13px; }
.news-toolbar .refresh-btn { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
.news-toolbar .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

/* Loading */
.loading { text-align:center; padding:40px; color:var(--muted); }
.empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

/* Concepts */
.concept-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; transition:border-color .15s; cursor:pointer; }
.concept-card:hover { border-color:var(--accent); }
.concept-card.expanded { border-color:var(--accent); }
.concept-card .concept-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.concept-card .concept-name { font-size:15px; font-weight:600; color:var(--accent); }
.concept-card .concept-meta { font-size:12px; color:var(--muted); }
.concept-card .concept-stocks { display:flex; flex-wrap:wrap; gap:6px; }
.concept-card .stock-chip { display:inline-flex; align-items:center; gap:4px; background:var(--card); border:1px solid var(--border); border-radius:4px; padding:3px 8px; font-size:12px; }
.concept-card .stock-chip .chip-code { color:var(--accent); font-weight:500; }
.concept-card .stock-chip .chip-name { color:var(--text); }
.concept-card .stock-chip .chip-industry { color:var(--muted); font-size:11px; }
/* Source badges */
.source-badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; margin-right:3px; }
.source-badge.src-llm { background:rgba(139,92,246,0.2); color:#8b5cf6; }
.source-badge.src-llm_classify { background:rgba(139,92,246,0.15); color:#a78bfa; }
.source-badge.src-akshare_em { background:rgba(34,197,94,0.2); color:#22c55e; }
.source-badge.src-tushare { background:rgba(59,130,246,0.2); color:#3b82f6; }
.source-badge.src-news { background:rgba(245,158,11,0.2); color:#f59e0b; }
/* Expanded detail area */
.concept-detail { display:none; margin-top:16px; border-top:1px solid var(--border); padding-top:16px; }
.concept-card.expanded .concept-detail { display:block; }
.concept-detail .detail-section { margin-bottom:16px; }
.concept-detail .detail-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:8px; }
.concept-detail .stock-rank-list { max-height:300px; overflow-y:auto; }
.concept-detail .stock-rank-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-bottom:1px solid var(--border); font-size:12px; }
.concept-detail .stock-rank-item:last-child { border-bottom:none; }
.concept-detail .rank-num { color:var(--muted); width:20px; text-align:right; }
.concept-detail .rank-name { font-weight:500; color:var(--text); min-width:60px; }
.concept-detail .rank-code { color:var(--accent); font-size:11px; min-width:80px; }
.concept-detail .rank-score-bar { height:6px; background:var(--border); border-radius:3px; flex:1; min-width:50px; }
.concept-detail .rank-score-fill { height:100%; background:var(--accent); border-radius:3px; }
.concept-detail .rank-score-val { color:var(--muted); font-size:11px; min-width:35px; text-align:right; }
.concept-detail .news-scroll { max-height:200px; overflow-y:auto; }
.concept-detail .news-scroll-item { padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }
.concept-detail .news-scroll-item:last-child { border-bottom:none; }
.concept-detail .news-title { color:var(--text); }
.concept-detail .news-meta { color:var(--muted); font-size:11px; margin-top:2px; }
.sentiment-positive { color:#22c55e; }
.sentiment-negative { color:#ef4444; }
.sentiment-neutral { color:var(--muted); }

/* Action buttons & task panel */
.action-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:16px; }
.action-btn { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer; text-align:left; transition:all .15s; }
.action-btn:hover { border-color:var(--accent); background:rgba(59,130,246,0.06); }
.action-btn:active { transform:scale(0.98); }
.action-btn .action-icon { font-size:22px; margin-bottom:6px; }
.action-btn .action-label { font-size:14px; font-weight:600; }
.action-btn .action-desc { font-size:12px; color:var(--muted); margin-top:4px; }
.action-btn.running { border-color:var(--yellow); opacity:0.7; pointer-events:none; }
.action-btn.running .action-label::after { content:' (运行中...)'; color:var(--yellow); font-weight:400; font-size:12px; }

.task-list { margin-top:12px; }
.task-item { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; margin-bottom:8px; font-size:13px; }
.task-item .task-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.task-item .task-name { font-weight:600; }
.task-item .task-status { font-size:12px; padding:2px 8px; border-radius:10px; }
.task-item .task-status.running { background:var(--yellow); color:#000; }
.task-item .task-status.done { background:var(--green); color:#fff; }
.task-item .task-status.failed { background:var(--red); color:#fff; }
.task-item .task-status.pending { background:var(--muted); color:#fff; }
.task-log { background:#0d0f15; border-radius:4px; padding:8px; max-height:150px; overflow-y:auto; font-family:monospace; font-size:11px; color:var(--muted); white-space:pre-wrap; word-break:break-all; margin-top:6px; }

/* Responsive */
@media(max-width:768px) {
  .sidebar { width:60px; } .sidebar h1 { font-size:0; padding:10px; } .sidebar h1::first-letter { font-size:15px; }
  .nav li { padding:10px; font-size:0; } .nav li .icon { font-size:18px; }
  .main { padding:16px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h1>A股投研智能体</h1>
    <ul class="nav">
      <li class="active" data-page="overview"><span class="icon">&#9673;</span> 系统概览</li>
      <li data-page="news"><span class="icon">&#9993;</span> 消息面</li>
      <li data-page="stocks"><span class="icon">&#9733;</span> 股票库</li>
      <li data-page="semantic"><span class="icon">&#9782;</span> 语义搜索</li>
      <li data-page="alerts"><span class="icon">&#9888;</span> 预警信号</li>
      <li data-page="pool"><span class="icon">&#9830;</span> 图谱股池</li>
      <li data-page="concepts"><span class="icon">&#9827;</span> 概念图谱</li>
      <li data-page="sop"><span class="icon">&#9881;</span> SOP 管理</li>
    </ul>
  </div>
  <div class="main" id="content"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; };

async function api(path) {
  try { const r = await fetch(path); return await r.json(); } catch(e) { return null; }
}

// ── Navigation ──
$$('.nav li').forEach(li => {
  li.onclick = () => {
    $$('.nav li').forEach(l => l.classList.remove('active'));
    li.classList.add('active');
    loadPage(li.dataset.page);
  };
});

function loadPage(name) {
  // 离开概览页时停止任务轮询
  if (_taskPollTimer) { clearInterval(_taskPollTimer); _taskPollTimer = null; }
  const pages = { overview:renderOverview, news:renderNews, stocks:renderStocks, semantic:renderSemantic, alerts:renderAlerts, pool:renderPool, concepts:renderConcepts, sop:renderSOP };
  (pages[name] || renderOverview)();
}

// ── Overview ──
let _taskPollTimer = null;
async function renderOverview() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">系统概览</h2><div class="loading">加载中...</div>';
  const s = await api('/api/stats');
  if (!s) { c.innerHTML = '<div class="empty">无法连接 API 服务</div>'; return; }

  let html = '<h2 class="page-title">系统概览</h2><div class="stats-grid">';
  html += `<div class="stat-card blue"><div class="label">股票总数</div><div class="value">${s.stock_total||0}</div><div class="sub">活跃 ${s.stock_active||0}</div></div>`;
  html += `<div class="stat-card purple"><div class="label">语义向量</div><div class="value">${s.chroma_count||0}</div><div class="sub">ChromaDB 嵌入</div></div>`;
  html += `<div class="stat-card red"><div class="label">今日预警</div><div class="value">${s.alerts_today||0}</div><div class="sub">三共振信号</div></div>`;
  html += `<div class="stat-card yellow"><div class="label">SOP 待审</div><div class="value">${s.sop_pending||0}</div><div class="sub">共 ${s.sop_active||0} 条 (${s.sop_approved||0} 已批准)</div></div>`;
  html += `<div class="stat-card green"><div class="label">图谱股池</div><div class="value">${s.has_stock_pool?'已生成':'未生成'}</div><div class="sub">静态分析结果</div></div>`;
  html += `<div class="stat-card blue"><div class="label">LLM 缓存</div><div class="value">${s.llm_cache||0}</div><div class="sub">DeepSeek 调用缓存</div></div>`;
  html += '</div>';

  // Infrastructure status
  html += '<div class="panel"><div class="panel-title">基础设施状态</div><div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap">';
  html += `<span class="badge ${s.pg_error?'badge-st':'badge-approved'}">PostgreSQL ${s.pg_error?'离线':'在线'}</span>`;
  html += `<span class="badge ${(s.chroma_count||0)>0?'badge-approved':'badge-st'}">ChromaDB ${(s.chroma_count||0)>0?'在线':'离线'}</span>`;
  html += `<span class="badge ${s.redis_ok?'badge-approved':'badge-st'}">Redis ${s.redis_ok?'在线':'离线'}</span>`;
  html += '</div></div>';

  // Action panel
  html += '<div class="panel"><div class="panel-title">操作面板</div>';
  html += '<div class="action-grid" id="actionGrid">';
  html += `<div class="action-btn" onclick="triggerTask('init')" data-task="init"><div class="action-icon">&#9881;</div><div class="action-label">初始化数据</div><div class="action-desc">拉取全A股基础信息入库</div></div>`;
  html += `<div class="action-btn" onclick="triggerTask('semantic')" data-task="semantic"><div class="action-icon">&#9782;</div><div class="action-label">语义初始化</div><div class="action-desc">主营业务向量化入库 ChromaDB</div></div>`;
  html += `<div class="action-btn" onclick="triggerTask('static')" data-task="static"><div class="action-icon">&#9733;</div><div class="action-label">静态图谱构建</div><div class="action-desc">产业链分析 + 选股评分</div></div>`;
  html += `<div class="action-btn" onclick="triggerTask('dynamic')" data-task="dynamic"><div class="action-icon">&#9888;</div><div class="action-label">动态监控</div><div class="action-desc">RSS轮询 + 三共振预警</div></div>`;
  html += `<div class="action-btn" onclick="shutdownAll()" style="border-color:var(--red);opacity:0.85"><div class="action-icon" style="color:var(--red)">&#9211;</div><div class="action-label" style="color:var(--red)">安全关闭</div><div class="action-desc">落盘缓存 + 停止所有后台任务</div></div>`;
  html += `<div class="action-btn" onclick="runPreflight()" style="border-color:var(--purple);opacity:0.85"><div class="action-icon" style="color:var(--purple)">&#9745;</div><div class="action-label" style="color:var(--purple)">系统检查</div><div class="action-desc">检查所有基础设施状态</div></div>`;
  html += '</div>';
  html += '<div class="task-list" id="taskList"></div>';
  html += '</div>';

  c.innerHTML = html;
  pollTasks();
}

async function triggerTask(name) {
  try {
    const r = await fetch(`/api/run/${name}`, {method:'POST'});
    const d = await r.json();
    if (d.status === 'already_running') { alert(d.message); return; }
    pollTasks();
  } catch(e) { alert('触发失败: ' + e.message); }
}

async function shutdownAll() {
  if (!confirm('确定要安全关闭吗？\n\n将先落盘缓存数据，然后停止所有后台任务。')) return;
  const statusEl = document.querySelector('.task-list');
  try {
    if (statusEl) statusEl.innerHTML = '<div class="task-item"><div class="task-header"><span class="task-name">正在安全关闭...</span><span class="task-status running">执行中</span></div><div class="task-log">正在落盘缓存数据并停止后台任务...</div></div>';
    const r = await fetch('/api/shutdown?flush=true&kill_processes=false', {method:'POST'});
    const d = await r.json();
    let log = '';
    if (d.steps) {
      for (const s of d.steps) {
        const icon = s.success ? '✓' : '✗';
        log += `${icon} ${s.name}: ${s.message} (${s.elapsed_ms}ms)\n`;
      }
    }
    if (d.killed) d.killed.forEach(k => { log += `✓ 已停止: ${k.task} (PID ${k.pid})\n`; });
    if (d.errors) d.errors.forEach(e => { log += `✗ 失败: ${e.task}: ${e.error}\n`; });
    log += `\n${d.message || '关闭完成'}`;
    if (statusEl) statusEl.innerHTML = `<div class="task-item"><div class="task-header"><span class="task-name">安全关闭完成</span><span class="task-status done">完成</span></div><div class="task-log">${escHtml(log)}</div></div>`;
    else alert(d.message || '关闭完成');
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<div class="task-item"><div class="task-header"><span class="task-name">关闭失败</span><span class="task-status failed">失败</span></div><div class="task-log">${escHtml(e.message)}</div></div>`;
    else alert('关闭请求失败: ' + e.message);
  }
}

async function runPreflight() {
  const c = document.getElementById('content');
  const panel = document.querySelector('.task-list');
  if (panel) panel.innerHTML = '<div class="task-item"><div class="task-header"><span class="task-name">正在执行系统检查...</span><span class="task-status running">检查中</span></div></div>';
  try {
    const r = await fetch('/api/preflight');
    const d = await r.json();
    let log = '';
    for (const r of d.results) {
      const icon = r.passed ? '✓' : '✗';
      log += `${icon} ${r.name}: ${r.message}\n`;
    }
    const allOk = d.all_passed;
    log += `\n${allOk ? '✓ 全部检查通过!' : '✗ 有检查项未通过'}`;
    if (panel) {
      panel.innerHTML = `<div class="task-item"><div class="task-header"><span class="task-name">系统检查${allOk ? ' - 全部通过' : ' - 有异常'}</span><span class="task-status ${allOk ? 'done' : 'failed'}">${allOk ? '通过' : '异常'}</span></div><div class="task-log">${escHtml(log)}</div></div>`;
    } else {
      alert(log);
    }
  } catch(e) {
    alert('检查请求失败: ' + e.message);
  }
}

let _activeTasks = [];
async function pollTasks() {
  const d = await api('/api/tasks');
  if (!d) return;
  _activeTasks = d.tasks || [];
  const el = document.getElementById('taskList');
  if (!el) return;
  // Update button running state
  document.querySelectorAll('.action-btn').forEach(btn => {
    const taskName = btn.dataset.task;
    const running = _activeTasks.some(t => t.name === taskName && t.status === 'running');
    btn.classList.toggle('running', running);
  });
  // Render task list
  if (!_activeTasks.length) { el.innerHTML = ''; return; }
  let html = '';
  for (const t of _activeTasks.slice(0, 5)) {
    const statusMap = {running:'运行中', done:'已完成', failed:'失败', pending:'等待中', stopped:'已停止'};
    html += `<div class="task-item"><div class="task-header"><span class="task-name">${escHtml(t.label)}</span><span class="task-status ${t.status}">${statusMap[t.status]||t.status}</span></div>`;
    html += `<div style="color:var(--muted);font-size:12px">启动: ${t.started_at?.substring(11,19)||'-'}</div>`;
    if (t.log) html += `<div class="task-log">${escHtml(t.log)}</div>`;
    html += '</div>';
  }
  el.innerHTML = html;
  // Auto-poll if any running
  if (_taskPollTimer) clearInterval(_taskPollTimer);
  if (_activeTasks.some(t => t.status === 'running')) {
    _taskPollTimer = setInterval(pollTasks, 3000);
  } else {
    _taskPollTimer = null;
  }
}

async function renderNews() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">消息面</h2><div class="panel"><div class="news-toolbar"><div class="info">加载中...</div></div><div class="loading">获取最新消息...</div></div>';
  const d = await api('/api/news?limit=100');
  if (!d) { c.innerHTML = '<div class="empty">无法连接 API，请确认服务已启动</div>'; return; }
  let html = '<h2 class="page-title">消息面</h2><div class="panel">';
  // 状态诊断条
  if (d.redis === false) {
    html += `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">⚠ Redis 未连接 — ${escHtml(d.hint||'请检查 SSH 隧道')}</div>`;
  }
  html += `<div class="news-toolbar"><div class="info">实时消息 | 共 ${d.count} 条 | 多源聚合（财联社/国务院/证监会）${d.feed_total ? ' | 缓存 '+d.feed_total+' 条' : ''}</div><button class="refresh-btn" onclick="renderNews()">&#8635; 刷新</button></div>`;
  if (d.error) {
    html += `<div class="empty" style="color:var(--red)">读取异常: ${escHtml(d.error)}</div>`;
  } else if (!d.items.length) {
    html += `<div class="empty">暂无新闻数据<br><small style="line-height:2">
      ${d.redis ? '消息 feed 为空，请先启动 <b>动态监控</b> 采集新闻' : ''}
      <br>在上方操作面板点击「动态监控」或运行 <code>python main.py --mode dynamic</code>
    </small></div>`;
  } else {
    // Group by date
    let lastDate = '';
    for (const n of d.items) {
      const dt = n.pub_time ? new Date(n.pub_time) : null;
      const dateStr = dt ? dt.toLocaleDateString('zh-CN') : '未知日期';
      const timeStr = dt ? dt.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '';
      if (dateStr !== lastDate) {
        lastDate = dateStr;
        html += `<div style="padding:8px 0;margin-top:8px;border-top:1px solid var(--border);color:var(--accent);font-size:13px;font-weight:600">${dateStr}</div>`;
      }
      const summary = (n.summary||'').replace(/<[^>]*>/g, '').trim();
      const isPolicy = n.source_type === 'policy';
      const tagClass = isPolicy ? 'source-tag policy' : 'source-tag';
      const linkHtml = n.url ? `<a class="news-link" href="${escHtml(n.url)}" target="_blank">[原文]</a>` : '';
      html += `<div class="news-item">
        <div class="news-time"><span class="${tagClass}">${escHtml(n.source||'未知')}</span> ${timeStr}${linkHtml}</div>
        <div class="news-title">${escHtml(n.title||'')}</div>
        ${summary ? `<div class="news-summary">${escHtml(summary.substring(0, 500))}</div>` : ''}`;
      // 分析结果
      const a = n.analysis;
      if (a && a.status === 'analyzed') {
        const score = a.news_score || 0;
        const scoreCls = score >= 0.7 ? 'score-high' : (score >= 0.4 ? 'score-mid' : 'score-low');
        const codes = (() => { try { return JSON.parse(a.related_ts_codes || '[]'); } catch(e) { return []; } })();
        const terms = (() => { try { return JSON.parse(a.new_concept_terms || '[]'); } catch(e) { return []; } })();
        const companies = (() => { try { return JSON.parse(a.mentioned_companies || '[]'); } catch(e) { return []; } })();
        const supplyChain = (() => { try { return JSON.parse(a.supply_chain_impact || '[]'); } catch(e) { return []; } })();
        const impact = a.impact_type || '-';
        const impactConcept = a.impact_concept || '';
        const sentiment = a.sentiment || 'neutral';
        const sentimentText = sentiment === 'positive' ? '利好' : sentiment === 'negative' ? '利空' : '中性';
        const sentimentClass = `sentiment-${sentiment}`;
        const reason = a.reason || '';
        html += `<div class="news-analysis">
          <div class="analysis-row">
            <span class="score-badge ${scoreCls}">评分 ${(score*100).toFixed(0)}</span>
            <span><span class="analysis-label">影响: </span><span class="analysis-value">${escHtml(impact)}</span></span>
            ${impactConcept ? `<span style="margin-left:8px"><span class="analysis-label">概念: </span><span class="analysis-value" style="color:var(--accent);font-weight:600">${escHtml(impactConcept)}</span></span>` : ''}
            <span style="margin-left:8px" class="${sentimentClass}" style="font-weight:600">${sentimentText}</span>
          </div>`;
        if (reason) {
          html += `<div class="analysis-row" style="margin-top:4px"><span class="analysis-label">分析理由: </span><span style="color:var(--text);font-size:12px">${escHtml(reason)}</span></div>`;
        }
        if (codes.length) {
          html += `<div class="analysis-row" style="margin-top:4px"><span class="analysis-label">关联个股: </span>${codes.slice(0,8).map(c=>`<span class="stock-tag">${escHtml(c)}</span>`).join(' ')}${codes.length>8?'<span class="analysis-label"> +'+(codes.length-8)+'</span>':''}</div>`;
        }
        if (terms.length) {
          html += `<div class="analysis-row" style="margin-top:4px"><span class="analysis-label">概念词: </span><span class="analysis-value">${terms.slice(0,6).map(t=>escHtml(t)).join('、')}</span></div>`;
        }
        if (companies.length) {
          html += `<div class="analysis-row" style="margin-top:6px"><span class="analysis-label">提及公司: </span>`;
          for (const co of companies) {
            const impClass = co.impact === 'positive' ? 'sentiment-positive' : co.impact === 'negative' ? 'sentiment-negative' : '';
            const impText = co.impact === 'positive' ? '利好' : co.impact === 'negative' ? '利空' : '';
            html += `<span class="stock-tag" style="margin-right:6px">${escHtml(co.name||co.ts_code||'')} <small class="${impClass}">${impText}</small></span>`;
          }
          html += `</div>`;
        }
        if (supplyChain.length) {
          html += `<div class="analysis-row" style="margin-top:4px"><details><summary style="color:var(--muted);font-size:12px;cursor:pointer">供应链传导 (${supplyChain.length})</summary><div style="padding:4px 0 0 8px;font-size:12px">`;
          for (const sc of supplyChain) {
            const scImp = sc.impact === 'positive' ? 'sentiment-positive' : sc.impact === 'negative' ? 'sentiment-negative' : '';
            html += `<div style="padding:2px 0"><b>${escHtml(sc.name||sc.ts_code||'')}</b> <span style="color:var(--muted)">${escHtml(sc.relation||'')}</span> <span class="${scImp}">${sc.impact==='positive'?'利好':sc.impact==='negative'?'利空':''}</span><br><small style="color:var(--muted)">${escHtml(sc.reason||'')}</small></div>`;
          }
          html += '</div></details></div>';
        }
        html += `</div>`;
      } else if (a && a.status === 'filtered') {
        html += `<div class="news-analysis pending"><span class="analysis-label">📋 常规消息，未触发深度分析</span></div>`;
      } else if (a && a.status === 'error') {
        html += `<div class="news-analysis pending"><span class="analysis-label" style="color:var(--red)">⚠ 分析失败: ${escHtml(a.error_msg || '未知错误')}</span></div>`;
      } else if (a && a.status === 'processing') {
        html += `<div class="news-analysis pending"><span class="analysis-label" style="color:var(--accent)">🔄 正在分析中...</span></div>`;
      } else {
        html += `<div class="news-analysis pending"><span class="analysis-label">⏳ 分析排队中...</span></div>`;
      }
      html += `</div>`;
    }
  }
  html += '</div>';
  c.innerHTML = html;
}

let stockState = { page:1, search:'', sort:'circ_mv', order:'desc' };
async function renderStocks() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">股票库</h2><div class="panel"><div class="panel-header"><div class="toolbar"><input id="stockSearch" placeholder="搜索代码或名称..." value="'+stockState.search+'"><select id="stockSize"><option value="50">50条/页</option><option value="100">100条/页</option><option value="200">200条/页</option></select></div></div><div class="loading">加载中...</div></div>';

  $('#stockSearch').oninput = debounce(e => { stockState.search=e.target.value; stockState.page=1; fetchStocks(); }, 400);
  $('#stockSize').onchange = e => { stockState.size=+e.target.value; stockState.page=1; fetchStocks(); };
  fetchStocks();

async function fetchStocks() {
  const c = $('#content');
  const p = c.querySelector('.loading') || c.querySelector('.panel');
  const s = stockState;
  const d = await api(`/api/stocks?page=${s.page}&size=${s.size||50}&search=${encodeURIComponent(s.search)}&sort=${s.sort}&order=${s.order}`);
  if (!d) return;

  let html = `<table><thead><tr>
    <th onclick="sortStock('ts_code')">代码 ${sortIcon('ts_code')}</th>
    <th onclick="sortStock('name')">名称</th>
    <th onclick="sortStock('industry')">行业</th>
    <th onclick="sortStock('circ_mv')">流通市值 ${sortIcon('circ_mv')}</th>
    <th>状态</th>
  </tr></thead><tbody>`;
  for (const s of d.items) {
    const mv = s.circ_mv ? (s.circ_mv/10000).toFixed(0)+' 亿' : '-';
    const st = s.is_st ? '<span class="badge badge-st">ST</span>' : '<span class="badge badge-active">活跃</span>';
    html += `<tr><td><b>${s.ts_code}</b></td><td>${s.name}</td><td>${s.industry||'-'}</td><td>${mv}</td><td>${st}</td></tr>`;
  }
  if (!d.items.length) html += '<tr><td colspan="5" class="empty">无数据</td></tr>';
  html += '</tbody></table>';
  html += renderPagination(d.page, d.pages, 'gotoStockPage');

  const panel = c.querySelector('.panel');
  const toolbar = panel.querySelector('.panel-header');
  panel.innerHTML = '';
  panel.appendChild(toolbar);
  panel.insertAdjacentHTML('beforeend', html);
}

function sortStock(col) { stockState.sort=col; stockState.order=stockState.order==='desc'?'asc':'desc'; fetchStocks(); }
function sortIcon(col) { return stockState.sort===col ? (stockState.order==='desc'?'&#9660;':'&#9650;') : ''; }
function gotoStockPage(p) { stockState.page=p; fetchStocks(); }

async function doSemanticSearch() {

  r.innerHTML = html;
}

    html += `<div style="background:var(--yellow);color:#000;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">${escHtml(d.hint)}</div>`;
  }
  const sourceLabels = {akshare_em:'东财',tushare:'Tushare',llm:'LLM新闻',llm_classify:'LLM分类',news:'新闻',concept_graph:'图谱'};
  html += `<div style="color:var(--muted);font-size:13px;margin-bottom:16px">共 ${d.count} 个概念 | 来源: 东财概念 + LLM 自动发现 + 政策图谱</div>`;
  html += '<button class="btn btn-blue btn-sm" onclick="renderConcepts()" style="margin-bottom:16px">&#8635; 刷新</button>';
  if (!d.items.length) {
    html += '<div class="panel"><div class="empty">暂无概念数据<br><small>点击「构建概念图谱」或启动动态监控自动发现概念</small></div></div>';
  } else {
    for (const it of d.items) {
      const lastSeen = it.last_seen ? new Date(it.last_seen).toLocaleString('zh-CN') : '-';
      const srcBadges = (it.sources || []).map(s => `<span class="source-badge src-${s}">${sourceLabels[s]||s}</span>`).join('');
      const cid = `concept-${encodeURIComponent(it.concept)}`;
      html += `<div class="concept-card" id="${cid}" onclick="toggleConceptExpand('${escHtml(it.concept)}','${cid}')">
        <div class="concept-header">
          <div>
            <span class="concept-name">${escHtml(it.concept)}</span>
            <span style="margin-left:8px">${srcBadges}</span>
          </div>
          <span class="concept-meta">${it.stock_count || it.stocks.length} 只关联股 | 最后: ${lastSeen}</span>
        </div>
        <div class="concept-stocks">`;
      const details = it.stocks_detail || [];
      for (const s of details.slice(0, 15)) {
        const nameStr = s.name ? ` <span class="chip-name">${escHtml(s.name)}</span>` : '';
        const indStr = s.industry ? ` <span class="chip-industry">${escHtml(s.industry)}</span>` : '';
        const sBadges = (s.sources || []).map(src => `<span class="source-badge src-${src}" style="font-size:9px;padding:0 3px">${sourceLabels[src]||src}</span>`).join('');
        html += `<span class="stock-chip"><span class="chip-code">${escHtml(s.ts_code)}</span>${nameStr}${indStr} ${sBadges}</span>`;
      }
      if (details.length > 15) {
        html += `<span class="stock-chip" style="color:var(--muted)">+${details.length - 15} 更多 (点击展开)</span>`;
      }
      html += `</div>
        <div class="concept-detail" id="${cid}-detail"><div class="loading">加载详情...</div></div>
      </div>`;
    }
  }
  c.innerHTML = html;

  // 自动加载图谱树（如果有数据）
  loadGraphTree();
  // 检查构建进度
  pollGraphProgress();
}

// ── 概念图谱操作 ──
async function buildConceptGraph() {
  try {
    const r = await fetch('/api/concept-graph/build', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const d = await r.json();
    if (d.status === 'already_running') { alert(d.message); return; }
    document.getElementById('graphProgressBar').style.display = 'block';
    document.getElementById('graphBuildStatus').textContent = '构建中...';
    if (_graphPollTimer) clearInterval(_graphPollTimer);
    _graphPollTimer = setInterval(pollGraphProgress, 3000);
  } catch(e) { alert('触发失败: ' + e.message); }
}

async function pollGraphProgress() {
  const d = await api('/api/concept-graph/progress');
  if (!d || d.status === 'idle') return;

  const bar = document.getElementById('graphProgressBar');
  const fill = document.getElementById('graphProgressFill');
  const text = document.getElementById('graphProgressText');
  const status = document.getElementById('graphBuildStatus');
  if (!bar || !fill || !text || !status) return;

  bar.style.display = 'block';

  if (d.status === 'running' || d.status === 'fetching_policy' || d.status === 'extracting_layer0') {
    const estimatedTotal = (d.total_layer0 || 10) * 6;
    const pct = Math.min(99, Math.round(((d.discovered_count||0) / estimatedTotal) * 100));
    fill.style.width = pct + '%';
    fill.style.background = 'var(--accent)';
    const statusMap = {fetching_policy:'获取政策文本...', extracting_layer0:'提取核心概念...', running:'迭代扩展中...'};
    text.textContent = `${statusMap[d.status]||'处理中'} | 深度 ${d.current_depth||0} | 已发现 ${d.discovered_count||0} 个概念${d.current_concept ? ' | 当前: '+d.current_concept : ''}`;
    status.textContent = '构建中...';
    if (!_graphPollTimer) _graphPollTimer = setInterval(pollGraphProgress, 3000);
  } else if (d.status === 'completed') {
    fill.style.width = '100%';
    fill.style.background = 'var(--green)';
    text.textContent = `构建完成! 共发现 ${d.discovered_count||0} 个概念`;
    status.textContent = '已完成';
    status.style.color = 'var(--green)';
    if (_graphPollTimer) { clearInterval(_graphPollTimer); _graphPollTimer = null; }
    loadGraphTree();
  } else if (d.status === 'failed') {
    fill.style.width = '100%';
    fill.style.background = 'var(--red)';
    text.textContent = '构建失败: ' + (d.errors?.[0] || '未知错误');
    status.textContent = '失败';
    status.style.color = 'var(--red)';
    if (_graphPollTimer) { clearInterval(_graphPollTimer); _graphPollTimer = null; }
  }
}

async function loadGraphTree() {
  const d = await api('/api/concept-graph/tree');
  const panel = document.getElementById('conceptGraphTree');
  const content = document.getElementById('graphTreeContent');
  if (!panel || !content) return;
  if (!d || !d.nodes || !d.nodes.length) { panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  let html = `<div style="color:var(--muted);font-size:13px;margin-bottom:12px">共 ${d.total_nodes} 个概念 | 最大深度 ${d.max_depth}</div>`;

  function renderNode(node, indent) {
    const pad = indent * 24;
    const colors = ['var(--accent)', 'var(--green)', 'var(--purple)', 'var(--yellow)'];
    const depthColor = colors[Math.min(indent, 3)];
    const prefix = indent > 0 ? '<span style="color:var(--border)">└─</span> ' : '';
    const relStr = node.relation ? ` | ${escHtml(node.relation)}` : '';
    const relScore = node.relevance ? ` (${(node.relevance*100).toFixed(0)}%)` : '';
    const anchorStr = node.policy_anchor ? `<span style="color:var(--purple);font-size:11px;margin-left:6px">[${escHtml(node.policy_anchor.substring(0,30))}]</span>` : '';

    html += `<div style="padding:6px 0 6px ${pad}px;border-bottom:1px solid var(--border);font-size:13px">
      ${prefix}<span style="font-weight:600;color:${depthColor}">${escHtml(node.concept)}</span>
      <span style="color:var(--muted);font-size:12px;margin-left:8px">L${node.depth} | ${node.stock_count||0}股${relStr}${relScore}</span>
      ${anchorStr}
    </div>`;
    if (node.children) {
      for (const child of node.children) {
        renderNode(child, indent + 1);
      }
    }
  }

  for (const root of d.nodes) {
    renderNode(root, 0);
  }
  content.innerHTML = html;
}

async function addManualConcept() {
  const input = document.getElementById('manualConceptInput');
  const name = (input?.value || '').trim();
  if (!name) { alert('请输入概念名称'); return; }
  try {
    const r = await fetch('/api/concept-graph/add-concept', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({concept_name: name})});
    const d = await r.json();
    if (d.status === 'found') {
      alert(d.message);
      loadGraphTree();
    } else if (d.status === 'expanding') {
      alert(d.message);
      document.getElementById('graphProgressBar').style.display = 'block';
      document.getElementById('graphBuildStatus').textContent = '扩展中...';
      setTimeout(() => { loadGraphTree(); renderConcepts(); }, 5000);
    } else {
      alert(d.message || '操作完成');
    }
    if (input) input.value = '';
  } catch(e) { alert('操作失败: ' + e.message); }
}

async function toggleConceptExpand(conceptName, cardId) {
  const card = document.getElementById(cardId);
  const detail = document.getElementById(cardId + '-detail');
  if (!card || !detail) return;
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    return;
  }
  card.classList.add('expanded');
  // 如果已经加载过，不重复请求
  if (detail.dataset.loaded === '1') return;
  detail.innerHTML = '<div class="loading">加载详情...</div>';
  const d = await api(`/api/concepts/${encodeURIComponent(conceptName)}`);
  if (!d || d.error) { detail.innerHTML = `<div class="empty">${escHtml(d?.error||'加载失败')}</div>`; return; }
  detail.dataset.loaded = '1';
  const sourceLabels = {akshare_em:'东财',tushare:'Tushare',llm:'LLM新闻',llm_classify:'LLM分类',news:'新闻'};
  let html = '';
  // 来源
  html += `<div class="detail-section"><div class="detail-title">概念来源</div><div>`;
  (d.sources || []).forEach(s => { html += `<span class="source-badge src-${s}">${sourceLabels[s]||s}</span>`; });
  html += '</div></div>';
  // 股票排名
  html += '<div class="detail-section"><div class="detail-title">关联股票（按相关性评分排名）</div><div class="stock-rank-list">';
  const maxScore = d.stocks_ranked?.[0]?.score || 1;
  for (const [i, s] of (d.stocks_ranked || []).entries()) {
    const pct = maxScore > 0 ? Math.min(100, (s.score / maxScore) * 100) : 0;
    const sBadges = (s.sources || []).map(src => `<span class="source-badge src-${src}">${sourceLabels[src]||src}</span>`).join(' ');
    html += `<div class="stock-rank-item">
      <span class="rank-num">${i+1}</span>
      <span class="rank-name">${escHtml(s.name||'')}</span>
      <span class="rank-code">${escHtml(s.ts_code)}</span>
      <div class="rank-score-bar"><div class="rank-score-fill" style="width:${pct}%"></div></div>
      <span class="rank-score-val">${s.score.toFixed(2)}</span>
      <span>${sBadges}</span>
    </div>`;
  }
  if (!d.stocks_ranked?.length) html += '<div class="empty">暂无股票数据</div>';
  html += '</div></div>';
  // 相关新闻
  html += '<div class="detail-section"><div class="detail-title">相关新闻（最近10条）</div><div class="news-scroll">';
  for (const n of (d.related_news || [])) {
    const sentimentClass = `sentiment-${n.sentiment||'neutral'}`;
    const sentimentText = n.sentiment === 'positive' ? '利好' : n.sentiment === 'negative' ? '利空' : '中性';
    html += `<div class="news-scroll-item">
      <div class="news-title">${escHtml(n.title||'')}</div>
      <div class="news-meta"><span class="${sentimentClass}">${sentimentText}</span> | 评分: ${(n.score||0).toFixed(2)}</div>
    </div>`;
  }
  if (!d.related_news?.length) html += '<div class="empty" style="padding:10px">暂无相关新闻</div>';
  html += '</div></div>';
  detail.innerHTML = html;
}

// ── SOP ──
async function renderSOP() {
  const c = $('#content');
  c.innerHTML = '<h2 class="page-title">SOP 管理</h2><div class="loading">加载中...</div>';
  const [p, a] = await Promise.all([api('/sop/pending?limit=50'), api('/sop/active?limit=50')]);
  let html = '<h2 class="page-title">SOP 战法管理</h2>';
  // Pending
  html += `<div class="panel"><div class="panel-title">待审核 (${p?.count||0})</div>`;
  if (p && p.items.length) {
    for (const it of p.items) {
      html += `<div class="sop-card"><div class="sop-title"><span class="badge badge-pending">#${it.id}</span> ${it.status}</div>`;
      if (it.graph_json) html += `<pre>${escHtml(JSON.stringify(it.graph_json, null, 2))}</pre>`;
      if (it.source_text) html += `<p style="color:var(--muted);font-size:12px;margin-top:8px">${escHtml(it.source_text?.substring(0,200)||'')}</p>`;
      html += `<div class="sop-actions"><button class="btn btn-green btn-sm" onclick="sopAction('approve',${it.id})">通过</button><button class="btn btn-red btn-sm" onclick="sopAction('reject',${it.id})">拒绝</button></div></div>`;
    }
  } else { html += '<div class="empty">无待审核 SOP</div>'; }
  html += '</div>';
  // Active
  html += `<div class="panel"><div class="panel-title">已审核 (${a?.count||0})</div>`;
  if (a && a.items.length) {
    for (const it of a.items) {
      const badge = it.approved ? '<span class="badge badge-approved">已批准</span>' : '<span class="badge badge-pending">待批准</span>';
      html += `<div class="sop-card"><div class="sop-title">${badge} #${it.id} ${it.sop_name||''}</div>`;
      if (it.policy_name) html += `<p style="color:var(--muted);font-size:13px">关联政策: ${escHtml(it.policy_name)}</p>`;
      if (it.graph_json) html += `<pre>${escHtml(JSON.stringify(it.graph_json, null, 2))}</pre>`;
      if (it.approved_by) html += `<p style="color:var(--muted);font-size:12px;margin-top:6px">审核人: ${it.approved_by} | ${it.approved_at||''}</p>`;
      html += '</div>';
    }
  } else { html += '<div class="empty">无已审核 SOP</div>'; }
  html += '</div>';
  c.innerHTML = html;
}

async function sopAction(action, id) {
  if (action==='approve') await fetch(`/sop/approve/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:'{"approved_by":"admin"}'});
  else await fetch(`/sop/reject/${id}`, {method:'POST'});
  renderSOP();
}

// ── Helpers ──
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function renderPagination(cur, total, fnName) {
  if (total<=1) return '';
  let h = '<div class="pagination">';
  h += `<button onclick="${fnName}(${cur-1})" ${cur<=1?'disabled':''}>&lt;</button>`;
  const start = Math.max(1, cur-3), end = Math.min(total, cur+3);
  if (start>1) h += `<button onclick="${fnName}(1)">1</button>`;
  if (start>2) h += '<button disabled>...</button>';
  for (let i=start; i<=end; i++) h += `<button class="${i===cur?'active':''}" onclick="${fnName}(${i})">${i}</button>`;
  if (end<total-1) h += '<button disabled>...</button>';
  if (end<total) h += `<button onclick="${fnName}(${total})">${total}</button>`;
  h += `<button onclick="${fnName}(${cur+1})" ${cur>=total?'disabled':''}>&gt;</button>`;
  h += '</div>';
  return h;
}
